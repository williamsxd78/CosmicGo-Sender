name: windows-build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      sign:
        description: "Sign the build using CSC_LINK / CSC_KEY_PASSWORD secrets?"
        type: boolean
        default: true

jobs:
  build:
    runs-on: windows-2022
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      # Optional code signing.
      # Add the following repository secrets to enable signing:
      #   CSC_LINK          — base64-encoded .pfx / .p12 certificate
      #   CSC_KEY_PASSWORD  — certificate password
      # If secrets are missing the build proceeds unsigned.
      - name: Build (signed)
        if: ${{ github.event.inputs.sign != 'false' && env.CSC_LINK != '' }}
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Timestamp server + hash algo come from package.json
        run: npm run dist

      - name: Build (unsigned)
        if: ${{ github.event.inputs.sign == 'false' || env.CSC_LINK == '' }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run dist

      - name: List artifacts
        shell: pwsh
        run: |
          Get-ChildItem release -File | Where-Object { $_.Extension -in ".exe", ".blockmap", ".yml" } | Format-Table Name, Length

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cosmic-sender-windows-x64
          path: |
            release/CosmicSender-Setup-*.exe
            release/CosmicSender-Portable-*.exe
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/CosmicSender-Setup-*.exe
            release/CosmicSender-Portable-*.exe
            release/*.blockmap
            release/latest*.yml
          draft: true
          generate_release_notes: true
