name: windows-build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      sign:
        description: "Sign the build using CSC_LINK / CSC_KEY_PASSWORD secrets?"
        type: boolean
        default: false

# The project lives in the cosmic-sender/ subfolder of this repo.
defaults:
  run:
    working-directory: cosmic-sender

jobs:
  build:
    runs-on: windows-2022
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: cosmic-sender/yarn.lock

      - name: Install dependencies (yarn)
        run: yarn install --frozen-lockfile

      - name: Run unit tests
        run: yarn test

      - name: Build (signed)
        if: ${{ github.event.inputs.sign == 'true' }}
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: yarn dist

      - name: Build (unsigned)
        if: ${{ github.event.inputs.sign != 'true' }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: yarn dist

      - name: List artifacts
        shell: pwsh
        run: |
          Get-ChildItem release -File | Where-Object { $_.Extension -in ".exe", ".blockmap", ".yml" } | Format-Table Name, Length

      - name: Smoke test — launch the app and verify it starts
        shell: pwsh
        run: |
          $exe = Get-ChildItem release/win-unpacked/CosmicSender.exe
          Write-Host "Launching $($exe.FullName) ..."
          $proc = Start-Process -FilePath $exe.FullName -PassThru -WindowStyle Hidden
          Start-Sleep -Seconds 12
          if ($proc.HasExited) {
            Write-Error "App exited early with code $($proc.ExitCode) — this indicates a startup crash."
            exit 1
          }
          Write-Host "App is running (PID=$($proc.Id)). Terminating for CI cleanup."
          Stop-Process -Id $proc.Id -Force
          Get-Process | Where-Object { $_.Name -like "CosmicSender*" } | Stop-Process -Force -ErrorAction SilentlyContinue
          Write-Host "Smoke test passed."

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cosmic-sender-windows-x64
          path: |
            cosmic-sender/release/CosmicSender-Setup-*.exe
            cosmic-sender/release/CosmicSender-Portable-*.exe
            cosmic-sender/release/*.blockmap
            cosmic-sender/release/latest*.yml
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cosmic-sender/release/CosmicSender-Setup-*.exe
            cosmic-sender/release/CosmicSender-Portable-*.exe
            cosmic-sender/release/*.blockmap
            cosmic-sender/release/latest*.yml
          draft: true
          generate_release_notes: true
